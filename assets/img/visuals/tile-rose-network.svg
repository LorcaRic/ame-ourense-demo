<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-tilerose desc-tilerose">
  <title id="title-tilerose">Red de confianza</title>
  <desc id="desc-tilerose">Tile decorativo para Red</desc>
  
  <defs>
    <linearGradient id="bg-tilerose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-tilerose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-tilerose" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-tilerose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-tilerose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-tilerose" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-tilerose" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-tilerose" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-tilerose" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-tilerose" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-tilerose"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-tilerose)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-tilerose)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-tilerose)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-tilerose)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-tilerose)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-tilerose)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
      <rect width="1600" height="1000" rx="54" fill="#c90058" opacity=".96"/>
      <circle cx="1200" cy="130" r="340" fill="#fff" opacity=".12"/>
      <circle cx="180" cy="840" r="360" fill="#fff" opacity=".10"/>
      <path d="M160 680 C360 440, 620 780, 820 500 C980 280, 1160 300, 1400 420" fill="none" stroke="#fff" stroke-width="34" stroke-linecap="round" opacity=".46"/>
      <text x="170" y="500" text-anchor="start" fill="#ffffff" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:104px;letter-spacing:-1.2px;">Red</text>
      <text x="175" y="580" text-anchor="start" fill="#ffffff" opacity="0.78" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:850;font-size:44px;letter-spacing:-1.2px;">AME Ourense</text>
    
  </g>
</svg>
