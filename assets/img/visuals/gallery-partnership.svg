<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-partnership desc-partnership">
  <title id="title-partnership">Alianzas y colaboración</title>
  <desc id="desc-partnership">Ilustración de colaboración entre empresas, socias e instituciones</desc>
  
  <defs>
    <linearGradient id="bg-partnership" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-partnership" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-partnership" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-partnership" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-partnership" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-partnership" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-partnership" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-partnership" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-partnership" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-partnership" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-partnership"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-partnership)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-partnership)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-partnership)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-partnership)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-partnership)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-partnership)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
  <g filter="url(#shadow-partnership)"><rect x="168" y="154" width="1264" height="686" rx="64" fill="url(#glass-partnership)" stroke="#fff"/></g>
  <g filter="url(#softshadow-partnership)">
    <rect x="280" y="304" width="380" height="300" rx="42" fill="#ffffff" stroke="#eadde4"/>
    <rect x="940" y="304" width="380" height="300" rx="42" fill="#ffffff" stroke="#eadde4"/>
    <circle cx="470" cy="410" r="74" fill="url(#brand-partnership)" opacity=".9"/><text x="470" y="425" text-anchor="middle" fill="#fff" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:40px;letter-spacing:-1.2px;">AME</text>
    <circle cx="1130" cy="410" r="74" fill="#3b0826" opacity=".94"/><text x="1130" y="425" text-anchor="middle" fill="#fff" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:38px;letter-spacing:-1.2px;">ORG</text>
    <path d="M630 474 C740 392, 860 392, 970 474" fill="none" stroke="url(#brand-partnership)" stroke-width="30" stroke-linecap="round"/>
    <path d="M630 514 C740 596, 860 596, 970 514" fill="none" stroke="#ffcf4a" stroke-width="20" stroke-linecap="round" opacity=".74"/>
  </g>
  <circle cx="800" cy="494" r="58" fill="#ffffff" stroke="#eadde4" stroke-width="6"/><text x="800" y="508" text-anchor="middle" fill="#c90058" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:56px;letter-spacing:-1.2px;">+</text>
  <text x="222" y="902" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:39px;letter-spacing:-1.2px;">Alianzas que multiplican impacto para la provincia</text>

  </g>
</svg>
