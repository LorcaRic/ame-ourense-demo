<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-news desc-news">
  <title id="title-news">Noticias y editorial</title>
  <desc id="desc-news">Publicación digital, entrevistas, notas de prensa y actualidad de AME Ourense</desc>
  
  <defs>
    <linearGradient id="bg-news" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-news" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-news" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-news" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-news" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-news" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-news" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-news" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-news" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-news" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-news"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-news)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-news)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-news)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-news)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-news)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-news)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
  <g filter="url(#shadow-news)"><rect x="170" y="150" width="1260" height="700" rx="64" fill="url(#glass-news)" stroke="#fff"/></g>
  <g filter="url(#softshadow-news)">
    <rect x="290" y="250" width="710" height="480" rx="46" fill="#ffffff" stroke="#eadde4"/>
    <rect x="290" y="250" width="710" height="130" rx="46" fill="url(#brand-news)"/>
    <text x="345" y="335" text-anchor="start" fill="#ffffff" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:48px;letter-spacing:-1.2px;">AME Noticias</text>
    <rect x="350" y="430" width="260" height="200" rx="30" fill="#fff8f4"/><path d="M378 570 C450 508, 528 512, 586 462" stroke="#c90058" stroke-width="14" fill="none" stroke-linecap="round"/>
    <rect x="650" y="434" width="280" height="22" rx="11" fill="#3b0826" opacity=".16"/><rect x="650" y="490" width="220" height="18" rx="9" fill="#c90058" opacity=".24"/><rect x="650" y="535" width="250" height="18" rx="9" fill="#ff9f00" opacity=".35"/><rect x="650" y="580" width="190" height="18" rx="9" fill="#3b0826" opacity=".12"/>
    
    <g filter="url(#softshadow-news)">
      <rect x="1080" y="300" width="190" height="340" rx="34" fill="#3b0826"/>
      <rect x="1092" y="320" width="166" height="300" rx="24" fill="url(#bg-news)"/>
      <rect x="1112" y="362" width="126" height="16" rx="8" fill="#c90058" opacity=".65"/>
      <rect x="1112" y="396" width="144" height="72" rx="18" fill="#ffffff" opacity=".9"/>
      <rect x="1112" y="486" width="126" height="16" rx="8" fill="#ff9f00" opacity=".75"/>
      <circle cx="1175.0" cy="616" r="6" fill="#ffffff" opacity=".5"/>
    </g>
  </g>
  
    <g filter="url(#softshadow-news)">
      <path d="M1130.32 677.84 C 1182.16 662.0, 1198.0 630.32, 1218.16 613.04" fill="none" stroke="#ffd1b8" stroke-width="12.959999999999999" stroke-linecap="round"/><circle cx="1222.48" cy="610.16" r="7.92" fill="#ffd1b8"/>
      <path d="M1035.28 768.56 C 1049.68 692.24, 1064.08 663.44, 1095.76 653.36 C 1133.2 663.44, 1149.04 695.12, 1162.0 768.56 Z" fill="#c90058"/>
      <path d="M1055.44 702.3199999999999 C 1077.04 723.92, 1114.48 723.92, 1136.08 702.3199999999999" fill="none" stroke="#ffffff" stroke-width="5.04" stroke-linecap="round" opacity=".74"/>
      <circle cx="1092.88" cy="622.4" r="33.12" fill="#ffd1b8"/>
      <path d="M1058.32 624.56 C 1049.68 582.8, 1079.92 559.76, 1120.24 571.28 C 1146.16 579.92, 1147.6 615.92, 1131.76 641.84 C 1120.24 622.4, 1110.16 605.84, 1088.56 608.72 C 1074.16 610.16, 1066.96 620.24, 1058.32 624.56 Z" fill="#3b0826"/>
      <circle cx="1081.36" cy="624.56" r="2.88" fill="#3b0826" opacity=".65"/>
      <circle cx="1110.16" cy="624.56" r="2.88" fill="#3b0826" opacity=".65"/>
      <path d="M1087.12 644.0 C 1098.64 651.92, 1111.6 649.04, 1120.24 640.4" fill="none" stroke="#9b214c" stroke-width="3.5999999999999996" stroke-linecap="round" opacity=".55"/>
    </g>
  <text x="224" y="902" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:40px;letter-spacing:-1.2px;">Noticias, historias de socias y actividad visible</text>

  </g>
</svg>
