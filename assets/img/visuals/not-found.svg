<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-notfound desc-notfound">
  <title id="title-notfound">Página no encontrada</title>
  <desc id="desc-notfound">Ilustración elegante para la página 404</desc>
  
  <defs>
    <linearGradient id="bg-notfound" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-notfound" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-notfound" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-notfound" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-notfound" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-notfound" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-notfound" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-notfound" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-notfound" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-notfound" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-notfound"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-notfound)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-notfound)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-notfound)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-notfound)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-notfound)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-notfound)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
  <g filter="url(#shadow-notfound)"><rect x="260" y="190" width="1080" height="620" rx="64" fill="url(#glass-notfound)" stroke="#fff"/></g>
  <path d="M500 600 C650 420, 850 690, 1060 430" fill="none" stroke="url(#brand-notfound)" stroke-width="30" stroke-linecap="round" opacity=".7"/>
  <text x="800" y="430" text-anchor="middle" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:160px;letter-spacing:-1.2px;">404</text>
  <text x="800" y="520" text-anchor="middle" fill="#c90058" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:52px;letter-spacing:-1.2px;">Página no encontrada</text>
  <circle cx="1080" cy="396" r="56" fill="#ffcf4a" opacity=".8"/>
  <text x="800" y="884" text-anchor="middle" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:38px;letter-spacing:-1.2px;">Volver al inicio y continuar navegando</text>

  </g>
</svg>
