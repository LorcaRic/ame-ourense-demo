<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-quote desc-quote">
  <title id="title-quote">Cita de comunidad</title>
  <desc id="desc-quote">Fondo abstracto para una cita institucional o manifiesto AME</desc>
  
  <defs>
    <linearGradient id="bg-quote" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-quote" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-quote" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-quote" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-quote" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-quote" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-quote" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-quote" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-quote" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-quote" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-quote"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-quote)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-quote)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-quote)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-quote)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-quote)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-quote)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
  <g filter="url(#shadow-quote)"><rect x="180" y="170" width="1240" height="660" rx="64" fill="url(#plum-quote)"/></g>
  <circle cx="1230" cy="280" r="250" fill="url(#brand-quote)" opacity=".35"/>
  <path d="M320 660 C520 460, 794 744, 1010 500 C1120 374, 1234 392, 1340 430" fill="none" stroke="#ffcf4a" stroke-width="20" stroke-linecap="round" opacity=".72"/>
  <text x="292" y="334" text-anchor="start" fill="#ffcf4a" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:160px;letter-spacing:-1.2px;">“</text>
  <text x="410" y="380" text-anchor="start" fill="#ffffff" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:70px;letter-spacing:-1.2px;">Una red para crecer</text>
  <text x="412" y="452" text-anchor="start" fill="#ffffff" opacity="0.82" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;font-size:48px;letter-spacing:-1.2px;">juntas, visibles y conectadas.</text>
  <text x="410" y="562" text-anchor="start" fill="#ffcf4a" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:34px;letter-spacing:-1.2px;">AME Ourense</text>

  </g>
</svg>
