<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-contact desc-contact">
  <title id="title-contact">Contacto en Ourense</title>
  <desc id="desc-contact">Mapa visual, dirección y canales de contacto de AME Ourense</desc>
  
  <defs>
    <linearGradient id="bg-contact" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-contact" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-contact" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-contact" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-contact" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-contact" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-contact" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-contact" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-contact" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-contact" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-contact"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-contact)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-contact)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-contact)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-contact)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-contact)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-contact)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
  
    <g opacity="0.8">
      <path d="M0 833 C 240 769, 370 795, 540 823 C 760 861, 960 753, 1220 801 C 1420 837, 1510 787, 1600 811 V1000 H0 Z" fill="#3b0826" opacity=".08"/>
      <path d="M250 863 H1370" stroke="#3b0826" stroke-opacity=".16" stroke-width="8" stroke-linecap="round"/>
      <path d="M286 863 C420 745, 640 745, 774 863" fill="none" stroke="#3b0826" stroke-width="8" stroke-opacity=".15"/>
      <path d="M826 863 C960 755, 1180 755, 1316 863" fill="none" stroke="#3b0826" stroke-width="8" stroke-opacity=".15"/>
      <rect x="104" y="755" width="74" height="132" rx="8" fill="#3b0826" opacity=".08"/>
      <rect x="196" y="793" width="90" height="94" rx="8" fill="#3b0826" opacity=".06"/>
      <rect x="1324" y="767" width="86" height="120" rx="8" fill="#3b0826" opacity=".07"/>
    </g>
  <g filter="url(#shadow-contact)"><rect x="170" y="160" width="1260" height="680" rx="64" fill="url(#glass-contact)" stroke="#fff"/></g>
  <g filter="url(#softshadow-contact)">
    <path d="M402 510 C 426 350, 620 238, 808 304 C 984 366, 1138 302, 1228 456 C 1316 606, 1180 740, 982 714 C 788 688, 654 786, 510 706 C 418 656, 386 598, 402 510 Z" fill="#ffffff" stroke="#eadde4"/>
    <path d="M470 576 C610 486, 718 506, 826 430 C952 342, 1076 390, 1198 324" fill="none" stroke="#c90058" stroke-width="12" stroke-linecap="round" opacity=".34"/>
    <path d="M520 660 C676 612, 814 666, 1038 572" fill="none" stroke="#ff9f00" stroke-width="12" stroke-linecap="round" opacity=".34"/>
    <path d="M790 360 C 700 466, 700 612, 790 714 C 890 610, 890 466, 790 360 Z" fill="url(#brand-contact)" opacity=".94"/>
    <circle cx="790" cy="493" r="54" fill="#fff"/><text x="790" y="509" text-anchor="middle" fill="#c90058" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:34px;letter-spacing:-1.2px;">AME</text>
  </g>
  
    <g filter="url(#softshadow-contact)">
      <rect x="250" y="250" width="270" height="150" rx="30" fill="url(#glass-contact)" stroke="#ffffff" stroke-opacity=".9"/>
      <rect x="274" y="274" width="64" height="64" rx="22" fill="#c90058" opacity=".12"/>
      <circle cx="306" cy="306" r="16" fill="#c90058"/>
      <text x="274" y="378" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:32px;letter-spacing:0;">Email</text>
      <text x="274" y="414" text-anchor="start" fill="#6d5c66" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:650;font-size:19px;letter-spacing:0;">info@asoc-ame.es</text>
    </g>
  
    <g filter="url(#softshadow-contact)">
      <rect x="1040" y="560" width="270" height="150" rx="30" fill="url(#glass-contact)" stroke="#ffffff" stroke-opacity=".9"/>
      <rect x="1064" y="584" width="64" height="64" rx="22" fill="#ff9f00" opacity=".12"/>
      <circle cx="1096" cy="616" r="16" fill="#ff9f00"/>
      <text x="1064" y="688" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:32px;letter-spacing:0;">Ourense</text>
      <text x="1064" y="724" text-anchor="start" fill="#6d5c66" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:650;font-size:19px;letter-spacing:0;">Alejandro Outeiriño, 15</text>
    </g>
  <text x="224" y="902" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:40px;letter-spacing:-1.2px;">Contacto claro para socias, prensa e instituciones</text>

  </g>
</svg>
