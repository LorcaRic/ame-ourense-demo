<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-about desc-about">
  <title id="title-about">Historia y futuro de AME Ourense</title>
  <desc id="desc-about">Línea visual de historia local, comunidad empresarial y evolución digital</desc>
  
  <defs>
    <linearGradient id="bg-about" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-about" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-about" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-about" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-about" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-about" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-about" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-about" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-about" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-about" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-about"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-about)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-about)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-about)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-about)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-about)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-about)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
  
    <g opacity="0.82">
      <path d="M0 818 C 240 754, 370 780, 540 808 C 760 846, 960 738, 1220 786 C 1420 822, 1510 772, 1600 796 V1000 H0 Z" fill="#3b0826" opacity=".08"/>
      <path d="M250 848 H1370" stroke="#3b0826" stroke-opacity=".16" stroke-width="8" stroke-linecap="round"/>
      <path d="M286 848 C420 730, 640 730, 774 848" fill="none" stroke="#3b0826" stroke-width="8" stroke-opacity=".15"/>
      <path d="M826 848 C960 740, 1180 740, 1316 848" fill="none" stroke="#3b0826" stroke-width="8" stroke-opacity=".15"/>
      <rect x="104" y="740" width="74" height="132" rx="8" fill="#3b0826" opacity=".08"/>
      <rect x="196" y="778" width="90" height="94" rx="8" fill="#3b0826" opacity=".06"/>
      <rect x="1324" y="752" width="86" height="120" rx="8" fill="#3b0826" opacity=".07"/>
    </g>
  <g filter="url(#shadow-about)"><rect x="166" y="178" width="1268" height="610" rx="58" fill="url(#glass-about)" stroke="#ffffff"/></g>
  <path d="M280 610 C 470 426, 658 472, 806 340 C 980 186, 1145 240, 1308 166" fill="none" stroke="url(#brand-about)" stroke-width="26" stroke-linecap="round" opacity=".78"/>
  <g>
    <circle cx="290" cy="610" r="42" fill="#ffffff" stroke="#c90058" stroke-width="8"/><text x="290" y="619" text-anchor="middle" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:23px;letter-spacing:0;">1986</text>
    <circle cx="626" cy="462" r="42" fill="#ffffff" stroke="#ff9f00" stroke-width="8"/><text x="626" y="471" text-anchor="middle" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:23px;letter-spacing:0;">Red</text>
    <circle cx="956" cy="270" r="42" fill="#ffffff" stroke="#c90058" stroke-width="8"/><text x="956" y="279" text-anchor="middle" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:23px;letter-spacing:0;">Hoy</text>
    <circle cx="1308" cy="166" r="42" fill="#ffffff" stroke="#ff9f00" stroke-width="8"/><text x="1308" y="175" text-anchor="middle" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:950;font-size:21px;letter-spacing:0;">Futuro</text>
  </g>
  
    <g filter="url(#softshadow-about)">
      <rect x="278" y="232" width="330" height="190" rx="30" fill="url(#glass-about)" stroke="#ffffff" stroke-opacity=".9"/>
      <rect x="302" y="256" width="64" height="64" rx="22" fill="#c90058" opacity=".12"/>
      <circle cx="334" cy="288" r="16" fill="#c90058"/>
      <text x="302" y="360" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:32px;letter-spacing:0;">Trayectoria</text>
      <text x="302" y="396" text-anchor="start" fill="#6d5c66" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:650;font-size:19px;letter-spacing:0;">Una asociación con memoria local.</text>
    </g>
  
    <g filter="url(#softshadow-about)">
      <rect x="690" y="494" width="358" height="190" rx="30" fill="url(#glass-about)" stroke="#ffffff" stroke-opacity=".9"/>
      <rect x="714" y="518" width="64" height="64" rx="22" fill="#ff9f00" opacity=".12"/>
      <circle cx="746" cy="550" r="16" fill="#ff9f00"/>
      <text x="714" y="622" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:32px;letter-spacing:0;">Comunidad</text>
      <text x="714" y="658" text-anchor="start" fill="#6d5c66" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:650;font-size:19px;letter-spacing:0;">Empresarias y profesionales conectadas.</text>
    </g>
  
    <g filter="url(#softshadow-about)">
      <rect x="1080" y="424" width="260" height="180" rx="30" fill="url(#glass-about)" stroke="#ffffff" stroke-opacity=".9"/>
      <rect x="1104" y="448" width="64" height="64" rx="22" fill="#7d0b49" opacity=".12"/>
      <circle cx="1136" cy="480" r="16" fill="#7d0b49"/>
      <text x="1104" y="552" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:32px;letter-spacing:0;">Digital</text>
      <text x="1104" y="588" text-anchor="start" fill="#6d5c66" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:650;font-size:19px;letter-spacing:0;">Más clara, visible y móvil.</text>
    </g>
  <text x="220" y="860" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:42px;letter-spacing:-1.2px;">Historia local con presencia digital renovada</text>

  </g>
</svg>
