<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title-resources desc-resources">
  <title id="title-resources">Biblioteca de recursos</title>
  <desc id="desc-resources">Plantillas, guías y documentos útiles para socias y profesionales</desc>
  
  <defs>
    <linearGradient id="bg-resources" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.45" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#fff0dc"/>
    </linearGradient>
    <linearGradient id="brand-resources" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c90058"/>
      <stop offset="0.46" stop-color="#f2386b"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="brand2-resources" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d0b49"/>
      <stop offset="0.52" stop-color="#df005f"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="plum-resources" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0826"/>
      <stop offset="1" stop-color="#78134c"/>
    </linearGradient>
    <linearGradient id="glass-resources" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="glow-resources" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#ffcf4a" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#f2386b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-resources" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#3b0826" flood-opacity="0.18"/>
    </filter>
    <filter id="softshadow-resources" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3b0826" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots-resources" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#c90058" opacity="0.08"/>
    </pattern>
    <pattern id="grid-resources" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#3b0826" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="round-resources"><rect x="0" y="0" width="1600" height="1000" rx="54"/></clipPath>
  </defs>
  <g clip-path="url(#round-resources)">
  
  <rect width="1600" height="1000" rx="54" fill="url(#bg-resources)"/>
  <rect width="1600" height="1000" rx="54" fill="url(#grid-resources)" opacity=".55"/>
  <circle cx="1310" cy="130" r="360" fill="url(#glow-resources)"/>
  <circle cx="120" cy="880" r="360" fill="#c90058" opacity=".055"/>
  <path d="M-80 230 C 160 70, 480 40, 760 122 C 980 186, 1110 340, 1660 214" fill="none" stroke="url(#brand-resources)" stroke-width="36" stroke-linecap="round" opacity=".16"/>
  <path d="M1060 -50 C 1170 185, 1350 210, 1524 92 C 1666 -4, 1728 228, 1530 344 C 1322 466, 1176 385, 1032 160" fill="none" stroke="url(#brand-resources)" stroke-width="50" stroke-linecap="round" opacity=".20"/>

  
  <g filter="url(#shadow-resources)"><rect x="180" y="154" width="1240" height="690" rx="64" fill="url(#glass-resources)" stroke="#fff"/></g>
  <g filter="url(#softshadow-resources)">
    <rect x="350" y="250" width="250" height="420" rx="34" fill="#c90058"/>
    <rect x="620" y="210" width="250" height="460" rx="34" fill="#ff8a00"/>
    <rect x="890" y="278" width="250" height="392" rx="34" fill="#3b0826"/>
    <path d="M398 352 H552" stroke="#fff" stroke-width="14" stroke-linecap="round" opacity=".8"/><path d="M398 412 H530" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity=".5"/><path d="M668 316 H820" stroke="#fff" stroke-width="14" stroke-linecap="round" opacity=".8"/><path d="M668 378 H792" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity=".48"/><path d="M938 382 H1090" stroke="#fff" stroke-width="14" stroke-linecap="round" opacity=".8"/><path d="M938 442 H1068" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity=".48"/>
  </g>
  <rect x="286" y="700" width="1028" height="50" rx="25" fill="#3b0826" opacity=".12"/>
  
    <g filter="url(#softshadow-resources)">
      <rect x="1070" y="198" width="260" height="140" rx="30" fill="url(#glass-resources)" stroke="#ffffff" stroke-opacity=".9"/>
      <rect x="1094" y="222" width="64" height="64" rx="22" fill="#c90058" opacity=".12"/>
      <circle cx="1126" cy="254" r="16" fill="#c90058"/>
      <text x="1094" y="326" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:32px;letter-spacing:0;">Descarga</text>
      <text x="1094" y="362" text-anchor="start" fill="#6d5c66" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:650;font-size:19px;letter-spacing:0;">Plantillas listas.</text>
    </g>
  <text x="226" y="902" text-anchor="start" fill="#3b0826" opacity="1" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:40px;letter-spacing:-1.2px;">Recursos claros para ahorrar tiempo a las socias</text>

  </g>
</svg>
